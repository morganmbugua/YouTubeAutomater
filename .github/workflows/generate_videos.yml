name: 🎬 YT Autopilot — Generate & Upload Videos

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours = 6 videos/day
  workflow_dispatch:
    inputs:
      force_topic:
        description: 'Optional: Force a specific topic (leave blank for AI choice)'
        required: false
        default: ''
      num_videos:
        description: 'Number of videos to generate (1-6)'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core libmagic1

      - name: 📦 Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: 🎬 Run all video slots sequentially
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_API_KEY:       ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID:  ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TIKTOK_ACCESS_TOKEN:   ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          FORCE_TOPIC:           ${{ github.event.inputs.force_topic }}
          NUM_VIDEOS:            ${{ github.event.inputs.num_videos || '1' }}
        run: python scripts/run_all_slots.py

      - name: 💾 Commit dashboard data + strategy
        if: always()
        run: |
          echo "--- Files in docs/data/ ---"
          ls -la docs/data/ || echo "docs/data/ does not exist!"
          git config user.name  "YT Autopilot Bot"
          git config user.email "bot@yt-autopilot.local"
          git pull --rebase origin main || true
          git add docs/data/ scripts/strategy.json output/topics_cache.json || true
          if git diff --staged --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "🤖 Autopilot run $(date +'%Y-%m-%d %H:%M UTC')"
            for attempt in 1 2 3; do
              git push && break || {
                echo "Push attempt $attempt failed — rebasing…"
                git pull --rebase origin main
              }
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
